name: cd
on:
  push:
    tags:
      - "v**"

env:
  ENABLE_FIPS_BUILDS: true # Set to false to disable FIPS builds

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: cd/checkout-repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: cd/setup-buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: v0.19.3

      - name: cd/docker-login
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: cd/push-docker
        run: make buildx-image
        env:
          OPERATOR_IMAGE_TAG: ${{ github.ref_name }}

      # Mirror the operator image to the Gamewarden Harbor registry on every
      # tag push.
      - name: cd/gamewarden-login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: registry.gamewarden.io
          username: ${{ secrets.GAMEWARDEN_REGISTRY_USERNAME }}
          password: ${{ secrets.GAMEWARDEN_REGISTRY_PASSWORD }}

      - name: cd/push-operator-to-gamewarden
        run: |
          SRC="mattermost/mattermost-operator:${{ github.ref_name }}"
          DST="registry.gamewarden.io/mattermost/mattermost-operator:${{ github.ref_name }}"

          echo "Mirroring ${SRC} (linux/amd64) to ${DST} ..."
          docker pull --platform linux/amd64 "${SRC}"
          docker tag "${SRC}" "${DST}"
          docker push "${DST}"

  build-fips:
    continue-on-error: true
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: cd/checkout-repo
        if: ${{ env.ENABLE_FIPS_BUILDS == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: cd/setup-buildx
        if: ${{ env.ENABLE_FIPS_BUILDS == 'true' }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: v0.19.3

      - name: cd/setup-chainctl
        if: ${{ env.ENABLE_FIPS_BUILDS == 'true' }}
        uses: chainguard-dev/setup-chainctl@c125f765e82b09a42af3185f3214465314d75c5d # v0.5.0
        with:
          identity: ee399b4c72dd4e58e3d617f78fc47b74733c9557/0439801bd43520ae

      - name: cd/docker-login
        if: ${{ env.ENABLE_FIPS_BUILDS == 'true' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: cd/push-docker-fips
        if: ${{ env.ENABLE_FIPS_BUILDS == 'true' }}
        run: make buildx-image-fips
        env:
          OPERATOR_IMAGE_TAG_FIPS: ${{ github.ref_name }}

  anchore-scan:
    runs-on: ubuntu-latest
    needs: [build, build-fips]
    steps:
      - name: cd/checkout-repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: security/anchore-scan
        id: anchore-operator
        uses: mattermost/actions/delivery/anchore-scan@354df0f666759a18085c7c7135db533f6b1da367
        with:
          image_name: mattermost/mattermost-operator:${{ github.ref_name }}
          dockerfile_path: ./Dockerfile
          show_vulnerabilities: 'false'
          anchorectl_url: ${{ secrets.ANCHORECTL_URL }}
          anchorectl_username: ${{ secrets.ANCHORECTL_USERNAME }}
          anchorectl_password: ${{ secrets.ANCHORECTL_PASSWORD }}
          ts_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          ts_oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}

      - name: security/anchore-scan-fips
        id: anchore-operator-fips
        uses: mattermost/actions/delivery/anchore-scan@354df0f666759a18085c7c7135db533f6b1da367
        with:
          image_name: mattermost/mattermost-operator-fips:${{ github.ref_name }}
          dockerfile_path: ./Dockerfile.fips
          show_vulnerabilities: 'false'
          anchorectl_url: ${{ secrets.ANCHORECTL_URL }}
          anchorectl_username: ${{ secrets.ANCHORECTL_USERNAME }}
          anchorectl_password: ${{ secrets.ANCHORECTL_PASSWORD }}
          ts_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          ts_oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}
