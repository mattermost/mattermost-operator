apiVersion: installation.mattermost.com/v1beta1
kind: Agent
metadata:
  name: langgraph-demo
  namespace: mattermost
spec:
  image: dev-registry:5000/langgraph-demo:dev
  mattermostRef:
    name: mattermost-dev
  egressPolicy: deny
  hooks:
    - MessageHasBeenPosted
    - ReactionHasBeenAdded
  llmGateway:
    operatorManaged:
      llmProviders:
        - name: anthropic
          secret: anthropic-key
          models:
            - claude-sonnet-4-5-20250929
